<html>test</html><!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Lab - 茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳莽庐隆莽聬聠茫聝聙茫聝聝茫聜路茫聝楼茫聝聹茫聝录茫聝聣</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e}
:root{--primary:#4361ee;--primary-light:#eef0ff;--accent:#f72585;--success:#06d6a0;--warning:#ffd166;--dark:#1a1a2e;--gray:#6c757d;--light:#f8f9fa;--shadow:0 2px 12px rgba(0,0,0,0.08)}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(180deg,#1a1a2e,#16213e);color:#fff;padding:20px 14px;position:fixed;height:100vh;overflow-y:auto;z-index:10}
.sidebar h1{font-size:17px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.sidebar .sub{font-size:11px;color:#adb5bd;margin-bottom:28px}
.nav-item{padding:11px 14px;border-radius:10px;cursor:pointer;margin-bottom:3px;font-size:13px;display:flex;align-items:center;gap:9px;color:#bbb;transition:.2s}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:var(--primary);color:#fff;font-weight:600}
.main{margin-left:240px;flex:1;padding:24px 28px;min-height:100vh}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-sub{color:var(--gray);font-size:13px;margin-bottom:20px}
.card{background:#fff;border-radius:14px;padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
.card h3{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:26px;font-weight:700;margin:2px 0}
.stat-card .unit{font-size:13px;color:var(--gray)}
.stat-card .sub{font-size:11px;color:var(--gray)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 10px;font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #eee}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0;font-size:13px}
tr:hover td{background:#fafbfc}
input,select,textarea{border:1.5px solid #ddd;border-radius:8px;padding:7px 10px;font-size:13px;width:100%;transition:.2s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
textarea{resize:vertical;min-height:50px}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#3a56d4}
.btn-outline{background:transparent;border:1.5px solid #ddd;color:var(--dark)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{background:#ff6b6b;color:#fff}
.btn-danger:hover{background:#ee5a5a}
.btn-success{background:var(--success);color:#fff}
.badge{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;display:inline-block;background:var(--primary-light);color:var(--primary)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:3px}
.form-row{display:flex;gap:10px}
.form-row>*{flex:1}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:16px;padding:24px;width:460px;max-width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{font-size:17px;margin-bottom:18px}
.progress-bar{height:7px;background:#eee;border-radius:4px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .3s}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.calendar-header{font-size:11px;font-weight:600;text-align:center;padding:6px;color:var(--gray)}
.cal-day{border:1.5px solid #eee;border-radius:8px;padding:6px;min-height:60px;font-size:11px;cursor:pointer;transition:.2s}
.cal-day:hover{border-color:var(--primary)}
.cal-day.has-training{border-color:var(--primary);background:var(--primary-light)}
.cal-day .dn{font-weight:700;color:var(--gray);margin-bottom:3px}
.cal-day .dn.today{color:var(--accent)}
.cal-day .ti{font-size:10px;background:#fff;padding:2px 5px;border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:36px;color:var(--gray);font-size:13px}
.share-banner{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:14px 18px;border-radius:12px;margin-bottom:18px}
.share-banner strong{font-size:14px}
.share-banner p{font-size:12px;opacity:.9;margin-top:3px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding:10px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col .bar{width:100%;border-radius:6px 6px 0 0;transition:.3s;min-height:2px;cursor:pointer;position:relative}
.bar-col .bar:hover{opacity:.85}
.bar-col .bar-label{font-size:10px;color:var(--gray)}
.bar-col .bar-val{font-size:10px;font-weight:600}
.line-chart{position:relative;height:180px;border-left:1px solid #ddd;border-bottom:1px solid #ddd;margin:10px 0}
.line-chart svg{width:100%;height:100%}
.day-picker{display:flex;flex-wrap:wrap;gap:3px}
.day-picker .dp{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:12px;border:1px solid #eee;transition:.2s}
.day-picker .dp:hover{border-color:var(--primary)}
.day-picker .dp.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
.day-picker .dp.has{background:#e6faf3;color:var(--success);border-color:#c3f0e0}
.menu-card{background:#f8f9fa;border-radius:8px;padding:10px;margin-bottom:7px}
.menu-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.hidden{display:none}
.page{display:none}
.page.active{display:block}
@media(max-width:800px){.sidebar{width:56px;padding:14px 6px}.sidebar h1,.sidebar .sub,.nav-item span{display:none}.nav-item{justify-content:center;padding:10px}.main{margin-left:56px;padding:14px}.grid-2{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h1>冒聼聮陋 Training Lab</h1>
    <div class="sub">茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳莽庐隆莽聬聠茫聝聙茫聝聝茫聜路茫聝楼茫聝聹茫聝录茫聝聣</div>
    <div id="nav"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
// ===== Embedded Data / URL氓聟卤忙聹聣 =====
var EMBEDDED_DATA = null;
var VIEWER_MODE = false;

// URL茫聝聫茫聝聝茫聜路茫聝楼茫聛聥茫聜聣茫聝聡茫聝录茫聜驴茫聜聮猫陋颅茫聛驴猫戮录茫聛驴
(function(){
  try {
    const h = location.hash;
    if(h && h.startsWith('#data=')){
      const b64 = decodeURIComponent(h.slice(6));
      const json = decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      EMBEDDED_DATA = JSON.parse(json);
    }
  } catch(e){ console.log('URL data parse error', e); }
})();

// ===== State =====
const S = {
  page: 'dashboard',
  trainings: [],
  bodyRecords: [],
  mealRecords: [],
  menus: [],
  profile: { name: '', height: '', trainerName: '' },
  currentMonth: new Date().getMonth(),
  currentYear: new Date().getFullYear(),
  selectedDate: fmt(new Date()),
};

function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
const TODAY = fmt(new Date());
const DAYS = ['忙聴楼','忙聹聢','莽聛芦','忙掳麓','忙聹篓','茅聡聭','氓聹聼'];
const CATS = ['猫聝赂','猫聝聦盲赂颅','猫聜漏','猫聟聲','猫聞職','猫聟鹿','忙聹聣茅聟赂莽麓聽','茫聜鹿茫聝聢茫聝卢茫聝聝茫聝聛','茫聛聺茫聛庐盲禄聳'];
const CAT_COLORS = ['#4361ee','#f72585','#06d6a0','#ffd166','#ff6b6b','#845ec2','#00c9a7','#ffc75f','#adb5bd'];

function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function firstDayOfMonth(y,m){return new Date(y,m,1).getDay()}

// ===== LocalStorage =====
function saveState(){
  if(VIEWER_MODE) return;
  try{localStorage.setItem('tlab',JSON.stringify({t:S.trainings,b:S.bodyRecords,m:S.mealRecords,mn:S.menus,p:S.profile}))}catch(e){}
}
function loadState(){
  // 氓聼聥茫聜聛猫戮录茫聛驴茫聝聡茫聝录茫聜驴茫聛聦茫聛聜茫聜聦茫聛掳茫聛聺茫聛隆茫聜聣茫聜聮氓聞陋氓聟聢茂录聢氓聟卤忙聹聣HTML茫聛庐氓聽麓氓聬聢茂录聣
  if(EMBEDDED_DATA){
    try{
      const d = EMBEDDED_DATA;
      S.trainings=d.t||[];S.bodyRecords=d.b||[];S.mealRecords=d.m||[];S.menus=d.mn||[];S.profile=d.p||S.profile;
      VIEWER_MODE = true;
      return;
    }catch(e){}
  }
  try{
    const d=JSON.parse(localStorage.getItem('tlab'));
    if(d){S.trainings=d.t||[];S.bodyRecords=d.b||[];S.mealRecords=d.m||[];S.menus=d.mn||[];S.profile=d.p||S.profile}
  }catch(e){}
}
loadState();

// ===== Nav =====
const PAGES = [
  {id:'dashboard',label:'茫聝聙茫聝聝茫聜路茫聝楼茫聝聹茫聝录茫聝聣',icon:'冒聼聯聤'},
  {id:'training',label:'茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳猫篓聵茅聦虏',icon:'冒聼聫聥茂赂聫'},
  {id:'menu',label:'茫聝隆茫聝聥茫聝楼茫聝录莽庐隆莽聬聠',icon:'冒聼聯聥'},
  {id:'body',label:'盲陆聯茅聡聧茫聝禄盲陆聯氓聻聥猫篓聵茅聦虏',icon:'芒職聳茂赂聫'},
  {id:'meal',label:'茅拢聼盲潞聥猫篓聵茅聦虏',icon:'冒聼聧陆茂赂聫'},
  {id:'annual',label:'氓鹿麓茅聳聯莽碌卤猫篓聢',icon:'冒聼聯聢'},
  {id:'settings',label:'猫篓颅氓庐職茫聝禄氓聟卤忙聹聣',icon:'芒職聶茂赂聫'},
];

function renderNav(){
  document.getElementById('nav').innerHTML = PAGES.map(p =>
    `<div class="nav-item ${S.page===p.id?'active':''}" onclick="go('${p.id}')">${p.icon} <span>${p.label}</span></div>`
  ).join('');
}

function viewerBanner(){
  if(!VIEWER_MODE) return '';
  const name = S.profile.name ? S.profile.name + '茫聛聲茫聜聯茫聛庐' : '';
  const date = EMBEDDED_DATA && EMBEDDED_DATA.exportDate ? EMBEDDED_DATA.exportDate : '';
  return `<div style="background:linear-gradient(135deg,#06d6a0,#00b4d8);color:#fff;padding:12px 18px;border-radius:10px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between">
    <div><strong>冒聼聭聙 茅聳虏猫娄搂茫聝垄茫聝录茫聝聣</strong><span style="margin-left:8px;font-size:13px">${name}茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳茫聝聙茫聝聝茫聜路茫聝楼茫聝聹茫聝录茫聝聣${date ? ' ('+date+' 忙聶聜莽聜鹿)' : ''}</span></div>
    <span style="font-size:11px;opacity:.8">茫聝聡茫聝录茫聜驴茫聛炉猫陋颅茫聛驴氓聫聳茫聜聤氓掳聜莽聰篓茫聛搂茫聛聶</span>
  </div>`;
}

function go(page){S.page=page;renderNav();renderPage()}

// ===== Render =====
function renderPage(){
  const m = document.getElementById('main');
  switch(S.page){
    case 'dashboard': m.innerHTML = dashboardHTML(); break;
    case 'training': m.innerHTML = trainingHTML(); break;
    case 'menu': m.innerHTML = menuHTML(); break;
    case 'body': m.innerHTML = bodyHTML(); break;
    case 'meal': m.innerHTML = mealHTML(); break;
    case 'annual': m.innerHTML = annualHTML(); break;
    case 'settings': m.innerHTML = settingsHTML(); break;
  }
}

// ===== Bar Chart Helper =====
function barChart(data, color='var(--primary)'){
  const max = Math.max(...data.map(d=>d.v), 1);
  return `<div class="bar-chart">${data.map(d=>
    `<div class="bar-col"><div class="bar-val">${d.v||''}</div><div class="bar" style="height:${(d.v/max)*120}px;background:${color}" title="${d.l}: ${d.v}"></div><div class="bar-label">${d.l}</div></div>`
  ).join('')}</div>`;
}

// ===== Simple Line Chart (SVG) =====
function lineChartSVG(data, key, color='var(--primary)'){
  if(data.length<2) return '<div class="empty">2盲禄露盲禄楼盲赂聤茫聛庐茫聝聡茫聝录茫聜驴茫聛搂茫聜掳茫聝漏茫聝聲茫聛聦猫隆篓莽陇潞茫聛聲茫聜聦茫聛戮茫聛聶</div>';
  const vals = data.map(d=>d[key]);
  const min = Math.min(...vals) - 1;
  const max = Math.max(...vals) + 1;
  const range = max - min || 1;
  const w = 100, h = 100;
  const points = data.map((d,i)=>{
    const x = (i/(data.length-1))*w;
    const y = h - ((d[key]-min)/range)*h;
    return `${x},${y}`;
  });
  const labels = data.map((d,i)=>{
    const x = (i/(data.length-1))*w;
    return `<text x="${x}%" y="98%" font-size="3" fill="#999" text-anchor="middle">${d.label||''}</text>`;
  }).join('');
  return `<div style="position:relative;height:200px;padding:10px 0"><svg viewBox="-2 -5 104 115" preserveAspectRatio="none" style="width:100%;height:100%">
    <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${data.map((d,i)=>{const x=(i/(data.length-1))*w;const y=h-((d[key]-min)/range)*h;return `<circle cx="${x}" cy="${y}" r="1.5" fill="${color}"/><text x="${x}" y="${y-3}" font-size="2.8" fill="#333" text-anchor="middle">${d[key]}</text>`}).join('')}
    ${labels}
  </svg></div>`;
}

// ===== Dashboard =====
function dashboardHTML(){
  const mt = S.trainings.filter(t=>{const d=new Date(t.date);return d.getMonth()===S.currentMonth&&d.getFullYear()===S.currentYear});
  const yt = S.trainings.filter(t=>new Date(t.date).getFullYear()===S.currentYear);
  const lb = S.bodyRecords.length>0 ? S.bodyRecords[S.bodyRecords.length-1] : null;
  const mealDays = S.mealRecords.filter(m=>{const d=new Date(m.date);return d.getMonth()===S.currentMonth&&d.getFullYear()===S.currentYear}).length;
  const goal=20;
  const pct = Math.min((mt.length/goal)*100,100);

  // Recent
  const recent = [...S.trainings].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  // Category pie
  const cc={};mt.forEach(t=>{cc[t.category]=(cc[t.category]||0)+1});
  const catEntries = Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  const totalCat = catEntries.reduce((s,e)=>s+e[1],0)||1;

  // Weekly
  const wk=[];
  for(let i=3;i>=0;i--){
    const s=new Date();s.setDate(s.getDate()-(i*7+s.getDay()));
    const e=new Date(s);e.setDate(e.getDate()+6);
    const c=S.trainings.filter(t=>{const d=new Date(t.date);return d>=s&&d<=e}).length;
    wk.push({l:`${s.getMonth()+1}/${s.getDate()}`,v:c});
  }

  return `
    ${viewerBanner()}
    <div class="page-title">茫聝聙茫聝聝茫聜路茫聝楼茫聝聹茫聝录茫聝聣</div>
    <div class="page-sub">${S.currentYear}氓鹿麓${S.currentMonth+1}忙聹聢茫聛庐茫聜碌茫聝聻茫聝陋茫聝录</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="label">盲禄聤忙聹聢茫聛庐茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳</div><div class="value" style="color:var(--primary)">${mt.length}<span class="unit">/ ${goal}氓聸聻</span></div>
        <div class="progress-bar" style="margin-top:6px"><div class="fill" style="width:${pct}%;background:var(--primary)"></div></div></div>
      <div class="stat-card"><div class="label">氓鹿麓茅聳聯茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳</div><div class="value" style="color:var(--accent)">${yt.length}<span class="unit">氓聸聻</span></div><div class="sub">${S.currentYear}氓鹿麓茫聛庐莽麓炉猫篓聢</div></div>
      <div class="stat-card"><div class="label">莽聫戮氓聹篓茫聛庐盲陆聯茅聡聧</div><div class="value" style="color:var(--success)">${lb?lb.weight:'--'}<span class="unit">kg</span></div><div class="sub">${lb?lb.date:'忙聹陋猫篓聵茅聦虏'}</div></div>
      <div class="stat-card"><div class="label">盲禄聤忙聹聢茫聛庐茅拢聼盲潞聥猫篓聵茅聦虏</div><div class="value" style="color:var(--warning)">${mealDays}<span class="unit">忙聴楼</span></div><div class="sub">猫篓聵茅聦虏茫聛聴茫聛聼忙聴楼忙聲掳</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><h3>冒聼聯聢 茅聙卤茅聳聯茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳忙聨篓莽搂禄</h3>${wk.some(w=>w.v>0)?barChart(wk):'<div class="empty">茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳茫聜聮猫篓聵茅聦虏茫聛聶茫聜聥茫聛篓茫聜掳茫聝漏茫聝聲茫聛聦猫隆篓莽陇潞茫聛聲茫聜聦茫聛戮茫聛聶</div>'}</div>
      <div class="card"><h3>冒聼聨炉 茫聜芦茫聝聠茫聜麓茫聝陋氓聢聠氓赂聝茂录聢盲禄聤忙聹聢茂录聣</h3>${catEntries.length>0?catEntries.map(([c,v])=>{
        const ci=CATS.indexOf(c);const col=CAT_COLORS[ci>=0?ci:8];
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><span class="badge">${c}</span><div style="flex:1"><div class="progress-bar"><div class="fill" style="width:${(v/totalCat)*100}%;background:${col}"></div></div></div><span style="font-size:12px;font-weight:600">${v}氓聸聻</span></div>`

function trainingHTML(){
  const dim = daysInMonth(S.currentYear,S.currentMonth);
  const fd = firstDayOfMonth(S.currentYear,S.currentMonth);
  const mt = S.trainings.filter(t=>{const d=new Date(t.date);return d.getMonth()===S.currentMonth&&d.getFullYear()===S.currentYear});
  const byDate={};mt.forEach(t=>{if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t)});

  let cal = DAYS.map(d=>`<div class="calendar-header">${d}</div>`).join('');
  for(let i=0;i<fd;i++) cal += '<div></div>';
  for(let d=1;d<=dim;d++){
    const ds = `${S.currentYear}-${String(S.currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = byDate[ds]||[];
    const isToday = ds===TODAY;
    cal += `<div class="cal-day ${dt.length?'has-training':''}" onclick="openTrainingAdd('${ds}')"><div class="dn ${isToday?'today':''}">${d}${isToday?' 芒聴聫':''}</div>${dt.map(t=>`<div class="ti">${t.category}</div>`).join('')}</div>`;

  return `

      ${VIEWER_MODE?'':`<button class="btn btn-primary" onclick="openTrainingAdd('${TODAY}')">茂录聥 猫篓聵茅聦虏茫聜聮猫驴陆氓聤聽</button>`}
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)">芒聴聙</button>
        <h3 style="margin:0">${S.currentYear}氓鹿麓 ${S.currentMonth+1}忙聹聢</h3>
        <button class="btn btn-outline btn-sm" onclick="changeMonth(1)">芒聳露</button>
      </div>
      <div class="calendar-grid">${cal}</div>
    </div>
    <div class="card"><h3>冒聼聯聺 ${S.currentMonth+1}忙聹聢茫聛庐茫聝聢茫聝卢茫聝录茫聝聥茫聝鲁茫聜掳盲赂聙猫娄搂茂录聢${mt.length}盲禄露茂录聣</h3>
      ${mt.length>0?`<table><thead><tr><th>忙聴楼盲禄聵</th><th>茫聜芦茫聝聠茫聜麓茫聝陋</th><th>茫聝隆茫聝聥茫聝楼茫聝录</th><th>茫聜禄茫聝聝茫聝聢</th><th>茫聝卢茫聝聝茫聝聴</th><th>茅聡聧茅聡聫</th><th>茫聝隆茫聝垄</th><th></th></tr></thead><tbody>${mt.map(t=>{
        const gi=S.trainings.indexOf(t);
        return `<tr><td>${t.date}</td><td><span class="badge">${t.category}</span></td><td>${t.name}</td><td>${t.sets||'-'}</td><td>${t.reps||'-'}</td><td>${t.weight_used?t.weight_used+'kg':'-'}</td><td style="font-size:11px;color:var(--gray)">${t.memo||'-'}</td><td><button class="btn btn-outline btn-sm" onclick="editTraining(${gi})">芒聹聫茂赂聫</button> <button class="btn btn-danger btn-sm" onclick="deleteTraining(${gi})">冒聼聴聭</button></td></tr>`;

function changeMonth(dir){

function selectMealDate(d){S.selectedDate=d;renderPage()}
function changeMealMonth(dir){
  S.currentMonth+=dir;
  if(S.currentMonth>11){S.currentMonth=0;S.currentYear++}
  if(S.currentMonth<0){S.currentMonth=11;S.currentYear--}
  const dim=daysInMonth(S.currentYear,S.currentMonth);
  const selDay=parseInt(S.selectedDate.split('-')[2]);
  const nd=Math.min(selDay,dim);
  S.selectedDate=`${S.currentYear}-${String(S.currentMonth+1).padStart(2,'0')}-${String(nd).padStart(2,'0')}`;
  renderPage();
}

function saveMeal(){
  S.mealRecords = S.mealRecords.filter(m=>m.date!==S.selectedDate);
  S.mealRecords.push({date:S.selectedDate,breakfast:document.getElementById('meal_b').value,lunch:document.getElementById('meal_l').value,dinner:document.getElementById('meal_d').value,snack:document.getElementById('meal_s').value,memo:document.getElementById('meal_m').value});
  S.mealRecords.sort((a,b)=>a.date.localeCompare(b.date));
  saveState();
  alert('盲驴聺氓颅聵茫聛聴茫聛戮茫聛聴茫聛聼');
  renderPage();
}

// ===== 氓聟卤忙聹聣URL莽聰聼忙聢聬 =====
function generateShareURL(){
  const data = {t:S.trainings,b:S.bodyRecords,m:S.mealRecords,mn:S.menus,p:S.profile,exportDate:TODAY};
  const json = JSON.stringify(data);
  // UTF-8氓炉戮氓驴聹茫聛庐Base64茫聜篓茫聝鲁茫聜鲁茫聝录茫聝聣
  const b64 = btoa(encodeURIComponent(json).replace(/%([0-9A-F]{2})/g,(m,p)=>String.fromCharCode('0x'+p)));
  const base = location.origin + location.pathname;
  const url = base + '#data=' + encodeURIComponent(b64);

  // URL茅聲路茫聝聛茫聜搂茫聝聝茫聜炉茂录聢茫聝聳茫聝漏茫聜娄茫聜露茫聛庐盲赂聤茅聶聬茫聛炉莽麓聞2MB茫聙聛氓庐聣氓聟篓茫聝聻茫聝录茫聜赂茫聝鲁茫聛搂64KB茂录聣
  if(url.length > 65000){
    alert('茫聝聡茫聝录茫聜驴茅聡聫茫聛聦氓陇職茫聛聶茫聛聨茫聛娄URL茫聛芦氓聫聨茫聛戮茫聜聤茫聛戮茫聛聸茫聜聯茫聙聜\n茫聙聦HTML茫聝聲茫聜隆茫聜陇茫聝芦茫聛搂氓聟卤忙聹聣茫聙聧茫聜聮茫聛聰氓聢漏莽聰篓茫聛聫茫聛聽茫聛聲茫聛聞茫聙聜');
    return;
  }

  const box = document.getElementById('share-url-box');
  const input = document.getElementById('share-url-input');
  box.style.display = 'block';
  input.value = url;
  input.select();
  try{ navigator.clipboard.writeText(url); }catch(e){ document.execCommand('copy'); }
}

// ===== 猫聡陋氓路卤氓庐聦莽碌聬氓聻聥HTML莽聰聼忙聢聬 =====
function generateShareHTML(){
  const data = {t:S.trainings,b:S.bodyRecords,m:S.mealRecords,mn:S.menus,p:S.profile,exportDate:TODAY};
  // 莽聫戮氓聹篓茫聛庐HTML茫聜陆茫聝录茫聜鹿茫聜聮氓聫聳氓戮聴
  let html = document.documentElement.outerHTML;
  // DOCTYPE猫驴陆氓聤聽
  html = '<!DOCTYPE html>\n<html lang="ja">' + html.slice(html.indexOf('<head'));
  // EMBEDDED_DATA茫聜聮氓聼聥茫聛聴忙聸驴茫聛聢
  html = html.replace(
    'var EMBEDDED_DATA = null;',
    'var EMBEDDED_DATA = ' + JSON.stringify(data) + ';'
  );
  const name = S.profile.name ? S.profile.name + '茫聛聲茫聜聯' : '';
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `training-dashboard-${name ? name + '-' : ''}${TODAY}.html`;
  a.click();
  URL.revokeObjectURL(url);
  alert('氓聟卤忙聹聣莽聰篓HTML茫聝聲茫聜隆茫聜陇茫聝芦茫聜聮茫聝聙茫聜娄茫聝鲁茫聝颅茫聝录茫聝聣茫聛聴茫聛戮茫聛聴茫聛聼茫聙聜\n茫聛聯茫聛庐茫聝聲茫聜隆茫聜陇茫聝芦茫聜聮茫聝聢茫聝卢茫聝录茫聝聤茫聝录茫聛芦茅聙聛茫聛拢茫聛娄茫聛聫茫聛聽茫聛聲茫聛聞茫聙聜\n茫聝聢茫聝卢茫聝录茫聝聤茫聝录茫聛炉茫聝聳茫聝漏茫聜娄茫聜露茫聛搂茅聳聥茫聛聫茫聛聽茫聛聭茫聛搂茅聳虏猫娄搂茫聛搂茫聛聧茫聛戮茫聛聶茫聙聜');
}

function exportData(){
  const data=JSON.stringify({t:S.trainings,b:S.bodyRecords,m:S.mealRecords,mn:S.menus,p:S.profile,exportDate:TODAY},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`training-data-${TODAY}.json`;a.click();URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.t)S.trainings=d.t;if(d.b)S.bodyRecords=d.b;if(d.m)S.mealRecords=d.m;if(d.mn)S.menus=d.mn;if(d.p)S.profile=d.p;
      saveState();renderPage();alert('茫聝聡茫聝录茫聜驴茫聜聮猫陋颅茫聛驴猫戮录茫聛驴茫聛戮茫聛聴茫聛聼');
    }catch{alert('茫聝聲茫聜隆茫聜陇茫聝芦氓陆垄氓录聫茫聛聦忙颅拢茫聛聴茫聛聫茫聛聜茫聜聤茫聛戮茫聛聸茫聜聯')}
  };
  reader.readAsText(file);
}

// ===== Modal =====
function showModal(title, body, onSave){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><h3>${title}</h3>${body}<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px"><button class="btn btn-outline" id="modal-cancel">茫聜颅茫聝拢茫聝鲁茫聜禄茫聝芦</button><button class="btn btn-primary" id="modal-save">盲驴聺氓颅聵</button></div></div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
  document.body.appendChild(overlay);
  overlay.querySelector('.modal').addEventListener('click',e=>e.stopPropagation());
  document.getElementById('modal-cancel').onclick=()=>overlay.remove();
  document.getElementById('modal-save').onclick=()=>{if(onSave()){overlay.remove()}};
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
